<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>João Rosa — Product Designer</title>
  <meta name="description" content="Product designer based in Aveiro, Portugal, with 10+ years designing SaaS experiences and tooling.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="bento" aria-label="João Rosa — Portfolio">

    <!-- Hero (col 1–3, row 1–3) -->
    <section class="tile tile--hero" aria-labelledby="hero-heading">
      <h1 id="hero-heading">hi there.</h1>
      <div class="hero-body">
        <p><strong data-en="I'm João Rosa and I'm a Product Designer based in Aveiro, Portugal."
                       data-pt="O meu nome é João Rosa e sou um Designer de Produto, baseado em Aveiro, Portugal."></strong></p>
        <p data-en="I've been designing stuff for 10+ years, and focusing on SaaS experiences and tooling for the past 6 years. You could say that helping admins and users alike make better use of their daily tools is my passion."
              data-pt="Trabalho há mais de 10 anos como designer, tendo me focado em experiências SaaS e de administração nos últimos 6 anos. Se puder escolher, estou sempre a pensar em interfaces e processos administrativos.  "></p>
        <p data-en="That, and running. Oh, and my dog Sancho, and my cat Quixote."
              data-pt="Nisso, e em correr. E no meu cão Sancho, e no meu gato Quixote."></p>
      </div>
    </section>

    <!-- Photo (col 4–5, row 1–2) -->
    <div class="tile tile--photo" aria-hidden="true">
      <div class="tile-image-wrap">
        <img src="assets/images/Photo1.png" alt="">
        <div class="photo-tint"></div>
      </div>
    </div>

    <!-- PT/EN toggle (col 6, row 1) -->
    <button class="tile tile--lang" aria-label="Toggle language" onclick="toggleLang()">
      <span class="lang-pt">PT/</span><span class="lang-en">EN</span>
    </button>

    <!-- Currently reading (col 6, row 2) -->
    <div class="tile tile--reading">
      <p class="reading-label"
         data-en="Currently reading"
         data-pt="Actualmente a ler"></p>
      <p class="reading-title"
         data-en='"What I Talk About When I Talk About Running"'
         data-pt='"What I Talk About When I Talk About Running"'></p>
      <p class="reading-author">by <strong>Haruki Murakami</strong></p>
    </div>

    <!-- Figma logo (col 4, row 3) -->
    <div class="tile tile--logo tile--figma" aria-label="Figma">
      <img src="assets/images/Figma_logo.svg" alt="Figma" class="logo-img">
    </div>

    <!-- Experience (col 5–6, row 3–4) -->
    <section class="tile tile--experience" aria-label="Work experience">
      <dl class="exp-list">
        <div class="exp-item">
          <dt>2022/Present:</dt>
          <dd data-en="AI/Product Designer at Trainual, Inc working on Admin and Core experiences, developing our Design System, and helping scale our feature set."
              data-pt="Designer de Produto/IA na Trainual, Inc, a trabalhar em experiências Administrativas e Core, a desenvolver o nosso Sistema de Design e a ajudar a escalar o nosso conjunto de funcionalidades."></dd>
        </div>
        <div class="exp-item">
          <dt>2021/2022:</dt>
          <dd data-en="Product Designer at 8x8, Inc developing and maintaining complex Admin experiences, focusing on merging SaaS systems."
              data-pt="Designer de Produto na 8x8, Inc, a desenvolver e manter experiências Administrativas complexas, com foco na fusão de sistemas SaaS."></dd>
        </div>
        <div class="exp-item">
          <dt>2019/2021:</dt>
          <dd data-en="Product Designer at Fuze, Inc, touching everything from chat and video meeting experiences, to Admin and Reporting tools."
              data-pt="Designer de Produto na Fuze, Inc, a trabalhar em tudo, desde experiências de chat e videochamadas, até ferramentas de Administração e Reporting."></dd>
        </div>
        <div class="exp-item">
          <dt>2014/2019:</dt>
          <dd data-en="Varied Agency work."
              data-pt="Trabalho variado em Agência."></dd>
        </div>
      </dl>
    </section>

    <!-- Portrait + Strava (col 1, row 4) -->
    <div class="tile tile--portrait" aria-hidden="true">
      <div class="tile-image-wrap">
        <img src="assets/images/Photo2.png" alt="">
        <div class="portrait-tint"></div>
      </div>
      <img src="assets/images/Strava_logo.svg" alt="Strava" class="tile-badge">
    </div>

    <!-- Contact (col 2–3, row 4) -->
    <div class="tile tile--contact">
      <p data-en='If you want to contact me, or just say hi, you can find me at <a href="https://joaorosa.pt">joaorosa.pt</a>, at <a href="mailto:joaocarlos.frosa@gmail.com">joaocarlos.frosa@gmail.com</a>, or at <a href="https://linkedin.com/in/joaocfrosa">linkedin.com/in/joaocfrosa</a>.'
         data-pt='Estou disponível em <a href="https://joaorosa.pt">joaorosa.pt</a>, em <a href="mailto:joaocarlos.frosa@gmail.com">joaocarlos.frosa@gmail.com</a>, ou em <a href="https://linkedin.com/in/joaocfrosa">linkedin.com/in/joaocfrosa</a>.'></p>
    </div>

    <!-- Claude logo (col 4, row 4) -->
    <div class="tile tile--logo tile--claude" aria-label="Claude">
      <img src="assets/images/Claude_logo.svg" alt="Claude" class="logo-img">
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
